<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 水平评估 - doai</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="shell nav">
      <a class="brand" href="index.html"><span class="mark">do</span><span>doai</span></a>
      <nav class="links" aria-label="主导航">
        <a href="index.html">首页</a>
        <a href="assessment.html" aria-current="page">AI 水平自测</a>
        <a href="routes.html">五个年级</a>
      </nav>
    </div>
  </header>
  <main>
    <section class="shell page-hero">
      <span class="eyebrow">评估占位</span>
      <h1>先认识自己的 AI 使用水平。</h1>
      <p class="lead">当前先用可视化占位图展示评估模型，后续补充问卷、评分规则和个性化路线推荐。</p>
    </section>
    <section class="band">
      <div class="shell grid-2">
        <article class="assessment-panel">
          <h2>示例结果：二年级「岗位重构」</h2>
          <p class="muted">从会用工具，走向能改造一类真实任务。</p>
          <div class="level-line" aria-label="AI 水平评估占位图">
            <div class="level-labels">
              <span>小试</span>
              <span>岗位</span>
              <span>工程</span>
              <span>组织</span>
              <span>前沿</span>
            </div>
            <div class="level-track"></div>
            <div class="level-dot"></div>
          </div>
        </article>
        <article class="assessment-panel">
          <h2>后续评估维度</h2>
          <div class="grid-2" style="margin-top:16px">
            <div class="card"><h3>工具使用</h3><p>是否能独立选择和组合 AI 工具。</p></div>
            <div class="card"><h3>提示表达</h3><p>是否能稳定描述目标、上下文和输出格式。</p></div>
            <div class="card"><h3>场景改造</h3><p>是否把 AI 用进真实任务。</p></div>
            <div class="card"><h3>项目交付</h3><p>是否做出可复用工具、流程或作品。</p></div>
          </div>
        </article>
      </div>
    </section>
  </main>
  <footer class="shell footer">返回 <a href="index.html">doai 首页</a></footer>
  <script src="assets/app.js"></script>
</body>
</html>
