      <p class="lead">doai 用年级结构帮助用户判断当前阶段，并明确每一步应该获得什么成果。</p>
    </section>

        <article class="card" id="grade-4"><span class="num n4">4</span><h3>四年级：组织/行业赋能</h3><p>为团队、部门或行业场景设计 AI 赋能方案。</p></article>
        <article class="card" id="grade-5"><span class="num n5">5</span><h3>五年级：创造新时代</h3><p>跟踪大佬原文、AI 论文和产业观点，形成判断框架。</p></article>
