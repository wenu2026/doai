name: Deploy to Tencent Lighthouse

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tencent-lighthouse
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: |
          npm run typecheck
          npm run lint
          npm run test

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ""

      - name: Pack release
        run: tar -czf doai-release.tgz out docker-compose.yml nginx.conf

      - name: Prepare server directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USER }}
          key: ${{ secrets.TENCENT_SSH_KEY }}
          port: ${{ secrets.TENCENT_PORT }}
          script: mkdir -p /home/ubuntu/apps/doai

      - name: Upload release to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USER }}
          key: ${{ secrets.TENCENT_SSH_KEY }}
          port: ${{ secrets.TENCENT_PORT }}
          source: doai-release.tgz
          target: /home/ubuntu/apps/doai

      - name: Restart container
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USER }}
          key: ${{ secrets.TENCENT_SSH_KEY }}
          port: ${{ secrets.TENCENT_PORT }}
          script: |
            set -eu
            cd /home/ubuntu/apps/doai
            tar -xzf doai-release.tgz
            sudo docker compose up -d
            sudo docker image prune -f
