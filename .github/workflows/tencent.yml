name: Deploy to Tencent Lighthouse

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tencent-lighthouse
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: |
          npm run typecheck
          npm run lint
          npm run test

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ""

      - name: Pack release
        run: tar -czf doai-release.tgz out docker-compose.yml nginx.conf

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.TENCENT_SSH_KEY }}" > ~/.ssh/tencent_lighthouse
          chmod 600 ~/.ssh/tencent_lighthouse
          ssh-keyscan -T 10 -p "${{ secrets.TENCENT_PORT }}" -H "${{ secrets.TENCENT_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload release to server
        run: |
          ssh -i ~/.ssh/tencent_lighthouse -o StrictHostKeyChecking=accept-new -p "${{ secrets.TENCENT_PORT }}" "${{ secrets.TENCENT_USER }}@${{ secrets.TENCENT_HOST }}" "mkdir -p /home/ubuntu/apps/doai"
          scp -i ~/.ssh/tencent_lighthouse -o StrictHostKeyChecking=accept-new -P "${{ secrets.TENCENT_PORT }}" doai-release.tgz "${{ secrets.TENCENT_USER }}@${{ secrets.TENCENT_HOST }}:/home/ubuntu/apps/doai/doai-release.tgz"

      - name: Restart container
        run: |
          ssh -i ~/.ssh/tencent_lighthouse -o StrictHostKeyChecking=accept-new -p "${{ secrets.TENCENT_PORT }}" "${{ secrets.TENCENT_USER }}@${{ secrets.TENCENT_HOST }}" <<'EOF'
          set -eu
          cd /home/ubuntu/apps/doai
          tar -xzf doai-release.tgz
          sudo docker compose up -d
          sudo docker image prune -f
          EOF
