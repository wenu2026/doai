server {
  listen 80;
  server_name doai.com 124.221.141.173 _;

  return 301 http://www.doai.com$request_uri;
}

server {
  listen 80;
  server_name www.doai.com;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /404.html;
  }

  location ~* \.(?:css|js|mjs|svg|png|jpg|jpeg|gif|webp|ico|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
